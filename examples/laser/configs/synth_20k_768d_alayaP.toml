# Synthetic 20k × 768d config for the unified LASER CLI wrapper.
# The older per-step alignment fields (`pca_seed`, `medoid_seed`,
# `rotator_seed`, `dump_rotator`) are intentionally not accepted here;
# use the master seed below.

seed = 42
build_threads = 1

[dataset]
name = "synth_20k_768d"
metric = "l2"
degree = 64
main_dimension = 256

[paths]
base = "/md1/huangliang/alaya-dev/data/synth_20k_768d/base.fbin"
query = "/md1/huangliang/alaya-dev/data/synth_20k_768d/query.fbin"
gt = "/md1/huangliang/alaya-dev/data/synth_20k_768d/gt.ibin"
output = "/md1/huangliang/alaya-dev/build_graph/synth_20k_768d/laser_port_alayaP"

[build_vamana]
L = 200
alpha = 1.2
dram_budget_gb = 1.0

[build]
ef_indexing = 200

[search]
topk = 10
threads = 1
beam_width = 16
dram_budget = 1.0
ep_num = 300
warmup = 2
runs = 3
efs = [30, 40, 50, 60, 80, 100, 130, 170, 220, 300, 400, 500]
