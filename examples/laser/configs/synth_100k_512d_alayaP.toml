# Synthetic 100k × 512d config for the unified LASER CLI wrapper.
# Use the master seed; per-step alignment fields are retired from
# `examples/laser/main.py`.

seed = 42
build_threads = 1

[dataset]
name = "synth_100k_512d"
metric = "l2"
degree = 64
main_dimension = 256

[paths]
base = "/md1/huangliang/alaya-dev/data/synth_100k_512d/base.fbin"
query = "/md1/huangliang/alaya-dev/data/synth_100k_512d/query.fbin"
gt = "/md1/huangliang/alaya-dev/data/synth_100k_512d/gt.ibin"
output = "/md1/huangliang/alaya-dev/build_graph/synth_100k_512d/laser_port_alayaP"

[build_vamana]
L = 200
alpha = 1.2
dram_budget_gb = 1.0

[build]
ef_indexing = 200

[search]
topk = 10
threads = 1
beam_width = 16
dram_budget = 1.0
ep_num = 300
warmup = 2
runs = 3
efs = [30, 40, 50, 60, 80, 100, 130, 170, 220, 300, 400, 500]
