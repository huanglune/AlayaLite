# sift1m.toml — SIFT-1M acceptance config for `uv run examples/laser/main.py`.
#
# This config exercises the `node_per_page_ > 1` codepath unlocked by
# `fix-laser-low-dim-page-layout`. SIFT-1M is `raw_dim=128`, `main_dim=64`
# (smallest FHT helper supported by the LASER rotator), giving
# `node_len_=2048 < kSectorLen=4096` and therefore `node_per_page_=2`.
#
# Field contract lives in docs/LASER.md.

[dataset]
name = "sift1m"
metric = "l2"
degree = 64          # Vamana build R; also the LASER degree_bound
main_dimension = 64  # PCA-reduced dim fed to LASER; residual = 128 - 64 = 64

[paths]
# SIFT-1M (Jégou 2011 ANN_SIFT1M) on the lab cluster. The dataset shas are
# pinned in docs/LASER.md (acceptance baseline).
base   = "/md1/huangliang/alaya-dev/data/sift1m/sift_base.fbin"
query  = "/md1/huangliang/alaya-dev/data/sift1m/sift_query.fbin"
gt     = "/md1/huangliang/alaya-dev/data/sift1m/sift_gt.ibin"
output = "/md1/huangliang/alaya-dev/build_graph/sift1m/laser_port"

# Master seed drives PCA, medoid, Vamana, and rotator randomness through
# `Index.fit(...)`. Pinned here so the recall artifact under `output/` is
# bit-reproducible at this seed + toolchain.
seed = 42

[build_vamana]
L = 100
alpha = 1.2
dram_budget_gb = 4.0

[build]
ef_indexing = 200

[search]
topk = 10
threads = 1
beam_width = 16
dram_budget = 1.0
ep_num = 300
warmup = 2
runs = 3
efs = [50, 100, 200, 400, 800]
