# Source of truth for the currently supported
# (data_type, id_type, quantization_type, index_type) dispatch matrix.
#
# This list is explicit (one row per supported combination) so reviews can
# reason about matrix diffs without reconstructing a Cartesian product.
combinations       :
- {data: float, id: uint32_t, quant: NONE, index: HNSW}
- {data: float, id: uint32_t, quant: NONE, index: NSG}
- {data: float, id: uint32_t, quant: NONE, index: FUSION}
- {data: float, id: uint32_t, quant: SQ8, index: HNSW}
- {data: float, id: uint32_t, quant: SQ8, index: NSG}
- {data: float, id: uint32_t, quant: SQ8, index: FUSION}
- {data: float, id: uint32_t, quant: SQ4, index: HNSW}
- {data: float, id: uint32_t, quant: SQ4, index: NSG}
- {data: float, id: uint32_t, quant: SQ4, index: FUSION}
- {data: float, id: uint32_t, quant: RABITQ, index: HNSW}
- {data: float, id: uint32_t, quant: RABITQ, index: NSG}
- {data: float, id: uint32_t, quant: RABITQ, index: FUSION}
- {data: float, id: uint64_t, quant: NONE, index: HNSW}
- {data: float, id: uint64_t, quant: NONE, index: NSG}
- {data: float, id: uint64_t, quant: NONE, index: FUSION}
- {data: float, id: uint64_t, quant: SQ8, index: HNSW}
- {data: float, id: uint64_t, quant: SQ8, index: NSG}
- {data: float, id: uint64_t, quant: SQ8, index: FUSION}
- {data: float, id: uint64_t, quant: SQ4, index: HNSW}
- {data: float, id: uint64_t, quant: SQ4, index: NSG}
- {data: float, id: uint64_t, quant: SQ4, index: FUSION}
- {data: int8_t, id: uint32_t, quant: NONE, index: HNSW}
- {data: int8_t, id: uint32_t, quant: NONE, index: NSG}
- {data: int8_t, id: uint32_t, quant: NONE, index: FUSION}
- {data: int8_t, id: uint64_t, quant: NONE, index: HNSW}
- {data: int8_t, id: uint64_t, quant: NONE, index: NSG}
- {data: int8_t, id: uint64_t, quant: NONE, index: FUSION}
- {data: uint8_t, id: uint32_t, quant: NONE, index: HNSW}
- {data: uint8_t, id: uint32_t, quant: NONE, index: NSG}
- {data: uint8_t, id: uint32_t, quant: NONE, index: FUSION}
- {data: uint8_t, id: uint64_t, quant: NONE, index: HNSW}
- {data: uint8_t, id: uint64_t, quant: NONE, index: NSG}
- {data: uint8_t, id: uint64_t, quant: NONE, index: FUSION}

search_spaces      :
  NONE: RawSpace<{data},{distance},{id},SequentialStorage<{data},{id}>,{scalar}>
  SQ8: SQ8Space<{data},{distance},{id},SequentialStorage<uint8_t,{id}>,{scalar}>
  SQ4: SQ4Space<{data},{distance},{id},SequentialStorage<uint8_t,{id}>,{scalar}>
  RABITQ: RaBitQSpace<{data},{distance},{id},{scalar}>

build_spaces       :
  NONE: RawSpace<{data},{distance},{id},SequentialStorage<{data},{id}>,{scalar}>
  SQ8: RawSpace<{data},{distance},{id},SequentialStorage<{data},{id}>,{build_scalar}>
  SQ4: RawSpace<{data},{distance},{id},SequentialStorage<{data},{id}>,{build_scalar}>
  RABITQ: RaBitQSpace<{data},{distance},{id},{scalar}>

builders           :
  HNSW: HNSWBuilder<{space}>
  NSG: NSGBuilder<{space}>
  FUSION: FusionGraphBuilder<{space},HNSWBuilder<{space}>,NSGBuilder<{space}>>

distance_type      : float
build_scalar_type  : EmptyScalarData
search_scalar_types:
  with_scalar: ScalarData
  without_scalar: EmptyScalarData
