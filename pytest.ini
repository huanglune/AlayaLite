[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths =
    python/tests
    tests/golden
addopts = -m "not extended and not nightly and not integration"
markers =
    extended: long-running scenarios (e.g. GIST-1M sharded byte-equal); not part of default CI
    nightly: nightly cadence checks (e.g. Tier B statistical envelope on full datasets)
    integration: builds real indices or requires local datasets; excluded from default CI run
