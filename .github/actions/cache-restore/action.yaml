---
name       : alayalite cache
description: |
  Restore or save the Conan dependency cache (~/.conan2) for AlayaLite C++
  builds. The cache key is keyed on target architecture, build type, and the
  files that drive the Conan dependency graph.

inputs     :
  mode:
    description: Cache operation to run (restore or save).
    required: false
    default: restore
  build-type:
    description: CMAKE_BUILD_TYPE (Debug, Release, etc.)
    required: false
    default: Release
  target-arch:
    description: Target architecture for Conan/cibuildwheel cache isolation.
    required: true

outputs    :
  cache-hit:
    description: Whether the restore operation found an exact cache hit.
    value: ${{ steps.restore-conan-cache.outputs.cache-hit }}

runs       :
  using: composite
  steps:
  - name: Restore Conan cache
    id: restore-conan-cache
    if: ${{ inputs.mode == 'restore' }}
    uses: actions/cache/restore@v5
    with:
      path: ~/.conan2
      key: >-
        conan-v2-${{ runner.os }}-${{ inputs.target-arch }}-${{ inputs.build-type }}-${{ hashFiles('conanfile.py',
        'scripts/conan_build/conan_install.py', 'scripts/conan_build/conan_profile*', 'cmake/ConanSetup.cmake',
        'pyproject.toml') }}
      restore-keys: |
        conan-v2-${{ runner.os }}-${{ inputs.target-arch }}-${{ inputs.build-type }}-

  - name: Save Conan cache
    if: ${{ inputs.mode == 'save' }}
    uses: actions/cache/save@v5
    with:
      path: ~/.conan2
      key: >-
        conan-v2-${{ runner.os }}-${{ inputs.target-arch }}-${{ inputs.build-type }}-${{ hashFiles('conanfile.py',
        'scripts/conan_build/conan_install.py', 'scripts/conan_build/conan_profile*', 'cmake/ConanSetup.cmake',
        'pyproject.toml') }}
