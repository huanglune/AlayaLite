---
# Verifies and prepares the shared native toolchain used by guarded g05 jobs.
# It relies on persistent local caches and never invokes hosted cache actions or system package managers.
name: G05 native bootstrap
description: Verify g05, prepare uv-managed Python and Conan, and reset ccache statistics.

runs:
  using: composite
  steps:
  - name: Expose user-local tools on PATH
    # The runner service PATH may not include ~/.local/bin, where uv and
    # uv-managed tools (conan) live; export it before any verification.
    shell: bash
    run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

  - name: Isolate the Conan cache per runner instance
    # The runner instances share one home; concurrent first-time exports into a
    # shared ~/.conan2 race ("Reference ... already exists"). One cache per
    # instance keeps every job serial within its own cache.
    shell: bash
    run: echo "CONAN_HOME=$HOME/.conan2-$RUNNER_NAME" >> "$GITHUB_ENV"

  - name: Verify g05 native toolchain
    shell: bash
    run: |
      command -v ccache
      command -v cmake
      command -v g++
      command -v uv
      test -f /usr/include/libaio.h
      test -f /usr/include/liburing.h

  - name: Ensure Conan 2
    # A machine may already provide a suitable Conan (g05 ships 2.x);
    # uv refuses to overwrite foreign executables, so install only on absence.
    shell: bash
    run: |
      if ! conan --version 2>/dev/null | grep -qE 'Conan version 2\.'; then
        uv tool install 'conan>=2,<3'
      fi
      conan profile detect 2>/dev/null || true

  - name: Prepare Python 3.12 with uv
    shell: bash
    run: |
      uv python install 3.12
      uv venv --python 3.12

  - name: Reset compiler cache statistics
    shell: bash
    run: ccache -z
