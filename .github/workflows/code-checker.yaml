---
name       : CI
on         :
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_integration:
        description: Run integration tests (requires self-hosted runner with LASER build)
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs       :
  commit-format-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v4
    - uses: gsactions/commit-message-checker@v2
      with:
        pattern: '^(feat|fix|docs|style|refactor|chore|perf|test|build|ci|revert)\(\S+\): .+'
        error: 'Commit message must follow Conventional Commits with a required (scope), e.g. feat(laser): warmup fix. See
          CONTRIBUTING.md.'
        excludeDescription: 'true'
        excludeTitle: 'false'
        checkAllCommitMessages: 'true'
        accessToken: ${{ secrets.GITHUB_TOKEN }}

  # Automatically detect spelling errors in the code library
  # Pure spelling checks, such as "receive" for "receive" and "environment" for "environment."
  typo-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout Actions Repository
      uses: actions/checkout@v4
    - name: Spell Check Repo
      uses: crate-ci/typos@v1.36.1
      with:
        config: ./.typo.toml

  py-format-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4

    - name: Check formatting with Ruff
      uses: astral-sh/ruff-action@v3
      with:
        args: format --check --diff

    - name: Lint code with Ruff
      uses: astral-sh/ruff-action@v3
      with:
        args: check


  py-lint-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: uv.lock

    - name: Analysing the code with pylint
      run: |
        uvx pylint --rcfile=./python/.pylintrc \
          ./examples/**/*.py \
          ./python/src/alayalite/**/*.py \
          ./python/tests/**/*.py

  py-unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
    - uses: actions/checkout@v4

    - name: Restore Conan cache
      id: conan-cache
      uses: ./.github/actions/cache-restore
      with:
        build-type: Release
        target-arch: ${{ runner.arch }}

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: uv.lock

    - name: Restore compiler cache
      uses: hendrikmuhs/ccache-action@v1
      with:
        key: >-
          py-unit-portable-v2-${{ runner.os }}-${{ runner.arch }}-Release-${{ hashFiles('CMakeLists.txt',
          'python/CMakeLists.txt', 'conanfile.py', 'scripts/conan_build/conan_install.py',
          'scripts/conan_build/conan_profile*', 'cmake/**/*.cmake') }}
        restore-keys: |
          py-unit-portable-v2-${{ runner.os }}-${{ runner.arch }}-Release-

    - name: Install system dependencies
      run: sudo apt-get install -y libaio-dev

    - name: Build Python test environment
      run: |
        export CMAKE_ARGS="-DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DALAYA_NATIVE_ARCH=OFF"
        uv sync --dev --locked

    - name: Verify dispatch codegen is up to date
      run: |
        uv run python3 tools/codegen/gen.py
        git diff --exit-code -- python/include/dispatch_generated.hpp python/tests/client/_dispatch_matrix_params.py

    - name: Save Conan cache
      if: steps.conan-cache.outputs.cache-hit != 'true'
      continue-on-error: true
      uses: ./.github/actions/cache-restore
      with:
        mode: save
        build-type: Release
        target-arch: ${{ runner.arch }}

    - name: Run Python unit/mock tests
      run: |
        uv run pytest -v

  py-integration-test:
    runs-on: [self-hosted, laser]
    if: github.event_name == 'workflow_dispatch' && inputs.run_integration
    timeout-minutes: 60
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: uv.lock

    - name: Run Python integration tests
      run: |
        uv sync --dev --group laser --locked
        uv run pytest -m integration -v
