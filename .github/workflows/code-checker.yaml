---
name       : CI
on         :
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_integration:
        description: Run integration tests (requires self-hosted runner with LASER build)
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs       :
  commit-format-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Only meaningful on pull_request: it gates new contributions against the
    # Conventional-Commits-with-scope rule. push events to main are typically
    # squash-merge artifacts or maintainer force-pushes that already passed PR
    # review; re-checking the full push range (which on force-push includes
    # historical squash commits like `feat: ...(#67)` predating the scope
    # rule) just blocks the merge without surfacing a real issue.
    if: github.event_name == 'pull_request'
    steps:
    - uses: actions/checkout@v4
    - uses: gsactions/commit-message-checker@v2
      with:
        pattern: '^(feat|fix|docs|style|refactor|chore|perf|test|build|ci|revert)\(\S+\): .+'
        error: 'Commit message must follow Conventional Commits with a required (scope), e.g. feat(laser): warmup fix. See
          CONTRIBUTING.md.'
        excludeDescription: 'true'
        excludeTitle: 'false'
        checkAllCommitMessages: 'true'
        accessToken: ${{ secrets.GITHUB_TOKEN }}

  # Ruff (format + lint), pylint, and typos are intentionally NOT duplicated here.
  # They run in precommit-checker.yaml via `pre-commit run --all-files`, which is the
  # single source of truth for every tool version (pinned in .pre-commit-config.yaml).
  # Keeping separate unpinned copies here previously let CI's ruff/pylint drift ahead
  # of the pinned versions and fail on files that pre-commit considered clean.

  py-integration-test:
    runs-on: [self-hosted, laser]
    if: github.event_name == 'workflow_dispatch' && inputs.run_integration
    timeout-minutes: 60
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: uv.lock

    - name: Run Python integration tests
      run: |
        uv sync --dev --group laser --locked
        uv run pytest -m integration -v
