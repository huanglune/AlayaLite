---
name: Build Wheels

on  :
  workflow_dispatch:
    inputs:
      quick:
        description: Build only cp312 per platform (branch validation; releases always build the full matrix)
        type: boolean
        default: false
  push:
    tags:
    - v*

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # 5-platform release wheel matrix. The Windows and Linux ARM wheels
        # ship without the LASER module (Windows lost its IOCP backend when
        # that dead code was removed; ARM was never enabled); macOS ships
        # sealed LASER via the portable thread-pool backend.
        include:
        - os: ubuntu-latest
          arch: x86_64
        - os: ubuntu-24.04-arm
          arch: aarch64
        - os: macos-15-intel
          arch: x86_64
        - os: macos-15
          arch: arm64
        - os: windows-2022
          arch: AMD64

    env:
      CONAN_NON_INTERACTIVE: 1
      CMAKE_ARGS: -DALAYA_NATIVE_ARCH=OFF -DBUILD_TOOLS=OFF
      # Wheel wall time is the per-platform *serial* loop over Python
      # versions, so quick mode's single interpreter is a real ~5x wall cut.
      # Both arms are spelled out because an empty CIBW_BUILD would not fall
      # back to pyproject's list - it would widen to cibuildwheel's full
      # default (PyPy included). The full arm mirrors [tool.cibuildwheel]
      # build in pyproject.toml; tag pushes have no inputs and take it.
      CIBW_BUILD: ${{ inputs.quick && 'cp312-*' || 'cp3{9,10,11,12,13}-*' }}
      # CI specific config: mount Conan and uv cache in Linux Docker
      CIBW_CONTAINER_ENGINE: 'docker; create_args: -v /home/runner/.conan2:/root/.conan2 -v /home/runner/.cache/uv:/root/.cache/uv'
      CIBW_ARCHS_LINUX: ${{ matrix.arch }}
      CIBW_ARCHS_MACOS: ${{ matrix.arch }}
      CIBW_ARCHS_WINDOWS: ${{ matrix.arch }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        # Linux cibuildwheel uses a Docker-mounted uv cache; setup-uv's
        # post-job prune can fail after successful wheel/artifact steps.
        prune-cache: ${{ runner.os != 'Linux' }}
        cache-dependency-glob: uv.lock
        cache-local-path: ${{ runner.os == 'Linux' && '/home/runner/.cache/uv' || '' }}

    - name: Restore Conan cache
      id: conan-cache
      uses: ./.github/actions/cache-restore
      with:
        build-type: Release
        target-arch: ${{ matrix.arch }}

    - name: Build wheels
      uses: pypa/cibuildwheel@v3.3

    - name: Save Conan cache
      if: steps.conan-cache.outputs.cache-hit != 'true'
      continue-on-error: true
      uses: ./.github/actions/cache-restore
      with:
        mode: save
        build-type: Release
        target-arch: ${{ matrix.arch }}

    - uses: actions/upload-artifact@v4
      with:
        name: cibw-wheels-${{ matrix.os }}-${{ matrix.arch }}
        path: ./wheelhouse/*.whl

  # Attach all 25 wheels (5 platforms × 5 Python versions) to the GitHub Release
  # that corresponds to the pushed tag. Runs only on `push.tags`; manual
  # workflow_dispatch builds skip this step (use them for build-matrix smoke
  # testing, not for cutting releases).
  github_release:
    name: Attach wheels to GitHub Release
    needs: [build_wheels]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        pattern: cibw-wheels-*
        path: dist
        merge-multiple: true

    - name: Upload wheels to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*.whl
        fail_on_unmatched_files: true
        generate_release_notes: true

  # Publish to prod PyPI. Token-based auth via the PYPI_API_TOKEN secret
  # (configure in repo Settings -> Secrets and variables -> Actions). For
  # extra safety, attach an `environment: pypi-production` with a required
  # reviewer in repo Settings -> Environments so this step waits for manual
  # approval before the irreversible upload — recommended but not enforced.
  upload_pypi:
    name: Publish to PyPI
    needs: [build_wheels]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    # Uncomment after configuring repo Settings -> Environments -> pypi-production
    # environment: pypi-production
    steps:
    - uses: actions/download-artifact@v4
      with:
        pattern: cibw-wheels-*
        path: dist
        merge-multiple: true

    - name: Publish wheels to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
        skip-existing: true
