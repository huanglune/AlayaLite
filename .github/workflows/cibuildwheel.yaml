---
name: Build Wheels

on  :
  workflow_dispatch:
  #   tags:
  #     - 'v*'

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # 5-platform release wheel matrix. Windows uses LASER's IOCP backend
        # (see openspec/changes/add-windows-portability-layer); Linux ARM
        # builds with LASER OFF by default (tracked in a separate change).
        include:
        - os: ubuntu-latest
          arch: x86_64
        - os: ubuntu-24.04-arm
          arch: aarch64
        - os: macos-15-intel
          arch: x86_64
        - os: macos-15
          arch: arm64
        - os: windows-2022
          arch: AMD64

    env:
      CONAN_NON_INTERACTIVE: 1
      CMAKE_ARGS: -DALAYA_NATIVE_ARCH=OFF -DBUILD_TOOLS=OFF
      # CI specific config: mount Conan and uv cache in Linux Docker
      CIBW_CONTAINER_ENGINE: 'docker; create_args: -v /home/runner/.conan2:/root/.conan2 -v /home/runner/.cache/uv:/root/.cache/uv'
      CIBW_ARCHS_LINUX: ${{ matrix.arch }}
      CIBW_ARCHS_MACOS: ${{ matrix.arch }}
      CIBW_ARCHS_WINDOWS: ${{ matrix.arch }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        # Linux cibuildwheel uses a Docker-mounted uv cache; setup-uv's
        # post-job prune can fail after successful wheel/artifact steps.
        prune-cache: ${{ runner.os != 'Linux' }}
        cache-dependency-glob: uv.lock
        cache-local-path: ${{ runner.os == 'Linux' && '/home/runner/.cache/uv' || '' }}

    - name: Restore Conan cache
      id: conan-cache
      uses: ./.github/actions/cache-restore
      with:
        build-type: Release
        target-arch: ${{ matrix.arch }}

    - name: Build wheels
      uses: pypa/cibuildwheel@v3.3

    - name: Save Conan cache
      if: steps.conan-cache.outputs.cache-hit != 'true'
      continue-on-error: true
      uses: ./.github/actions/cache-restore
      with:
        mode: save
        build-type: Release
        target-arch: ${{ matrix.arch }}

    - uses: actions/upload-artifact@v4
      with:
        name: cibw-wheels-${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.build_id }}
        path: ./wheelhouse/*.whl

