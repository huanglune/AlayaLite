---
# Builds quick branch wheels on demand, the full matrix weekly, and release wheels for v* tags.
# Hosted runners cover full/platform lanes; only guarded quick Linux x86_64 work runs on g05 Docker.
name: Wheels

on:
  workflow_dispatch:
    inputs:
      quick:
        description: Build only cp312 per platform (branch validation; releases always build the full matrix)
        type: boolean
        default: false
  push:
    tags:
    - v*
  schedule:
  - cron: 0 19 * * 0

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.event_name != 'schedule' }}

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    if: >-
      github.repository == 'huanglune/AlayaLite' ||
      (github.event_name != 'schedule' && !inputs.quick)
    runs-on: >-
      ${{ inputs.quick && matrix.os == 'ubuntu-latest' && fromJSON('["self-hosted","g05"]') || matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        # 5-platform release wheel matrix. The Windows and Linux ARM wheels
        # ship without the LASER module (Windows lost its IOCP backend when
        # that dead code was removed; ARM was never enabled); macOS ships
        # sealed LASER via the portable thread-pool backend.
        include:
        - os: ubuntu-latest
          arch: x86_64
        - os: ubuntu-24.04-arm
          arch: aarch64
        - os: macos-15-intel
          arch: x86_64
        - os: macos-15
          arch: arm64
        - os: windows-2022
          arch: AMD64

    env:
      CONAN_NON_INTERACTIVE: 1
      CMAKE_ARGS: -DALAYA_NATIVE_ARCH=OFF -DBUILD_TOOLS=OFF
      # Wheel wall time is the per-platform *serial* loop over Python
      # versions, so quick mode's single interpreter is a real ~5x wall cut.
      # Both arms are spelled out because an empty CIBW_BUILD would not fall
      # back to pyproject's list - it would widen to cibuildwheel's full
      # default (PyPy included). The full arm mirrors [tool.cibuildwheel]
      # build in pyproject.toml; tag pushes and schedules have no inputs and take it.
      CIBW_BUILD: ${{ inputs.quick && 'cp312-*' || 'cp3{11,12,13,14}-*' }}
      CIBW_ARCHS_LINUX: ${{ matrix.arch }}
      CIBW_ARCHS_MACOS: ${{ matrix.arch }}
      CIBW_ARCHS_WINDOWS: ${{ matrix.arch }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up uv on hosted runners
      if: runner.environment == 'github-hosted'
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
        # Linux cibuildwheel uses a Docker-mounted uv cache; setup-uv's
        # post-job prune can fail after successful wheel/artifact steps.
        prune-cache: ${{ runner.os != 'Linux' }}
        cache-dependency-glob: uv.lock
        cache-local-path: ${{ runner.os == 'Linux' && '/home/runner/.cache/uv' || '' }}

    - name: Verify g05 wheel toolchain
      if: runner.environment == 'self-hosted'
      run: |
        command -v ccache
        command -v docker
        command -v uv
        docker info

    - name: Reset compiler cache statistics
      if: runner.environment == 'self-hosted'
      run: ccache -z

    - name: Configure Linux container cache mounts
      if: runner.os == 'Linux'
      shell: bash
      run: >-
        echo "CIBW_CONTAINER_ENGINE=docker; create_args: -v $HOME/.conan2:/root/.conan2
        -v $HOME/.cache/uv:/root/.cache/uv" >> "$GITHUB_ENV"

    - name: Restore Conan cache on hosted runners
      if: runner.environment == 'github-hosted'
      id: conan-cache
      uses: ./.github/actions/conan-cache
      with:
        build-type: Release
        target-arch: ${{ matrix.arch }}

    - name: Build wheels
      # pypa/cibuildwheel publishes exact tags only; there is no moving v3 major tag.
      uses: pypa/cibuildwheel@v3.3

    - name: Show compiler cache statistics
      if: runner.environment == 'self-hosted' && always()
      run: ccache -s

    - name: Save Conan cache on hosted runners
      if: runner.environment == 'github-hosted' && steps.conan-cache.outputs.cache-hit != 'true'
      continue-on-error: true
      uses: ./.github/actions/conan-cache
      with:
        mode: save
        build-type: Release
        target-arch: ${{ matrix.arch }}

    - uses: actions/upload-artifact@v4
      with:
        name: cibw-wheels-${{ matrix.os }}-${{ matrix.arch }}
        path: ./wheelhouse/*.whl

  # Attach all 25 wheels (5 platforms × 5 Python versions) to the GitHub Release
  # that corresponds to the pushed tag. Manual and scheduled builds skip this
  # step; those channels validate artifacts but never publish them.
  github_release:
    name: Attach wheels to GitHub Release
    needs: [build_wheels]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        pattern: cibw-wheels-*
        path: dist
        merge-multiple: true

    - name: Upload wheels to GitHub Release
      uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
      with:
        files: dist/*.whl
        fail_on_unmatched_files: true
        generate_release_notes: true

  # Publish to prod PyPI. Token-based auth via the PYPI_API_TOKEN secret
  # (configure in repo Settings -> Secrets and variables -> Actions). For
  # extra safety, attach an `environment: pypi-production` with a required
  # reviewer in repo Settings -> Environments so this step waits for manual
  # approval before the irreversible upload — recommended but not enforced.
  upload_pypi:
    name: Publish to PyPI
    needs: [build_wheels]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    # Uncomment after configuring repo Settings -> Environments -> pypi-production
    # environment: pypi-production
    steps:
    - uses: actions/download-artifact@v4
      with:
        pattern: cibw-wheels-*
        path: dist
        merge-multiple: true

    - name: Publish wheels to PyPI
      uses: pypa/gh-action-pypi-publish@v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
        skip-existing: true
