---
# Runs full Python and gcc-13 C++ coverage nightly and through the manual channel.
# Hosted Ubuntu preserves the established Codecov toolchain; schedules are canonical-repository only.
name: Coverage

on:
  workflow_dispatch:
  schedule:
  - cron: 0 19 * * *

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.event_name != 'schedule' }}

jobs:
  codecov-python:
    if: github.event_name != 'schedule' || github.repository == 'huanglune/AlayaLite'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - name: Restore Conan cache
      id: conan-cache
      uses: ./.github/actions/conan-cache
      with:
        build-type: Release
        target-arch: ${{ runner.arch }}

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
        cache-dependency-glob: uv.lock

    - name: Restore compiler cache
      uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
      with:
        key: >-
          codecov-python-portable-v3-${{ runner.os }}-${{ runner.arch }}-gcc-Release-${{ hashFiles('conanfile.py',
          'pyproject.toml', 'uv.lock', 'cmake/AlayaConan.cmake', 'cmake/AlayaToolchain.cmake',
          'cmake/vendor/conan_provider.cmake') }}
        # ccache-action adds the timestamp separator to restore keys; a trailing
        # dash here would produce a double-dash prefix that cannot match.
        restore-keys: |
          codecov-python-portable-v3-${{ runner.os }}-${{ runner.arch }}-gcc-Release
          codecov-python-portable-v3-${{ runner.os }}-${{ runner.arch }}-Release
          py-unit-portable-v2-${{ runner.os }}-${{ runner.arch }}-Release
        max-size: 2G

    - name: Reset compiler cache statistics
      run: ccache -z

    - name: Install system dependencies
      run: sudo apt-get install -y gdb libaio-dev

    - name: Build Python coverage environment
      run: |
        export CMAKE_ARGS="-DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DALAYA_NATIVE_ARCH=OFF"
        uv sync --dev --locked

    - name: Show compiler cache statistics
      if: always()
      run: ccache -s

    - name: Save Conan cache
      if: steps.conan-cache.outputs.cache-hit != 'true'
      continue-on-error: true
      uses: ./.github/actions/conan-cache
      with:
        mode: save
        build-type: Release
        target-arch: ${{ runner.arch }}

    - name: Run python code coverage
      env:
        PYTHONFAULTHANDLER: '1'
      run: bash .github/scripts/codecov/python_coverage_with_crash_diagnostics.sh

    - name: Upload Python crash diagnostics
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: python-crash-diagnostics
        path: |
          core.*
          pytest-crash.log
          coverage.xml
          .venv/lib/python*/site-packages/alayalite/_alayalitepy*.so
        if-no-files-found: ignore
        retention-days: 7

    - name: Upload Python coverage to Codecov
      continue-on-error: true
      uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.5
      with:
        files: coverage.xml
        flags: python
        token: ${{ secrets.CODECOV_TOKEN }}

  codecov-cpp:
    if: github.event_name != 'schedule' || github.repository == 'huanglune/AlayaLite'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      BUILD_JOBS: 2
      # Hosted-runner evidence: j4 stretched CTest to 886-893s and timed out the
      # crash matrix; j2 completed all tests in 428.85s. Keep the measured
      # throughput optimum instead of oversubscribing the coverage build.
      CTEST_JOBS: 2
      # "." matches any label, so every labeled test runs in this lane. The
      # previous hand-maintained allowlist (unit|storage|simd|space|utils)
      # silently excluded the laser/wal/collection/crash suites as they were
      # added; heavyweight opt-outs belong in CTEST_EXCLUDE_REGEX instead.
      CTEST_LABELS: .
      OMP_NUM_THREADS: 1
      ALAYA_MAX_THREADS: 1
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - name: Restore Conan cache
      id: conan-cache
      uses: ./.github/actions/conan-cache
      with:
        build-type: Debug
        target-arch: ${{ runner.arch }}

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
        cache-dependency-glob: uv.lock

    - name: Restore compiler cache
      uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
      with:
        key: >-
          codecov-cpp-portable-v2-${{ runner.os }}-${{ runner.arch }}-gcc-13-Debug-${{ hashFiles('conanfile.py',
          'pyproject.toml', 'uv.lock', 'cmake/AlayaConan.cmake', 'cmake/AlayaToolchain.cmake',
          'cmake/vendor/conan_provider.cmake', '.github/scripts/codecov/gnu_codecoverage.sh') }}
        # ccache-action adds the timestamp separator to restore keys; a trailing
        # dash here would produce a double-dash prefix that cannot match.
        restore-keys: |
          codecov-cpp-portable-v2-${{ runner.os }}-${{ runner.arch }}-gcc-13-Debug
          codecov-cpp-portable-v2-${{ runner.os }}-${{ runner.arch }}-Debug
        max-size: 2G

    - name: Reset compiler cache statistics
      run: ccache -z

    - name: Install system dependencies
      run: sudo apt-get install -y lcov libaio-dev

    - name: Run c++ code coverage
      run: CMAKE_CXX_COMPILER_LAUNCHER=ccache bash .github/scripts/codecov/gnu_codecoverage.sh

    - name: Show compiler cache statistics
      if: always()
      run: ccache -s

    - name: Save Conan cache
      if: steps.conan-cache.outputs.cache-hit != 'true'
      continue-on-error: true
      uses: ./.github/actions/conan-cache
      with:
        mode: save
        build-type: Debug
        target-arch: ${{ runner.arch }}

    - name: Upload C++ coverage to Codecov
      uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.5
      with:
        files: coverage_c++.info
        flags: cpp
        token: ${{ secrets.CODECOV_TOKEN }}
