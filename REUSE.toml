version = 1

# Catch-all for AlayaDB.AI-owned files that do not carry their own SPDX header
# (docs, build files, configs, fixtures, assets). This block is FIRST so that
# the more specific third-party blocks below win under REUSE's "last matching
# table wins" rule. precedence = "closest" means the 312 source files that
# already carry inline SPDX headers keep them; this block only fills gaps.
[[annotations]]
path = "**"
precedence = "closest"
SPDX-FileCopyrightText = "2025 AlayaDB.AI"
SPDX-License-Identifier = "AGPL-3.0-only"

# --- Vendored third-party sources. These keep their upstream copyright and
#     license and are NOT relicensed to AGPL-3.0; both Apache-2.0 and MIT are
#     one-way compatible with AGPL-3.0. precedence = "override" plus their
#     position after the catch-all ensures they are matched last and win. ---

