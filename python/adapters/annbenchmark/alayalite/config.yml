---
float:
  any:
  - base_args: ['@metric', '@dimension']
    constructor: AlayaLite
    disabled: false
    docker_tag: ann-benchmarks-alayalite
    module: ann_benchmarks.algorithms.alayalite
    name: AlayaLite
    run_groups:
      alayalite:
        #### index_type HNSW FLAT
        args:
          M: 32
          R: [32]
          L: 200
          index_type: NONE
          quantization_type: RABITQ
          fit_threads: 1 # only batch search
          search_threads: 1 # only batch search
        query_args: [[10, 20, 40, 60, 80, 120, 200, 400, 600, 800]]
  - base_args: ['@metric', '@dimension']
    constructor: AlayaLiteDiskLaser
    disabled: false
    docker_tag: ann-benchmarks-alayalite
    module: ann_benchmarks.algorithms.alayalite
    name: AlayaLiteDiskLaser
    run_groups:
      disk_laser:
        args:
          # Aligned with Laser/reproduce/configs/gist1m_seed_alayaV_origP.toml
          # so adapter results map onto native seeded gist1m SUMMARY (run B).
          R: 64
          L: [200]
          alpha: 1.2
          seed: 42
          beam_width: 16
          fit_threads: 80
          search_threads: 1
          build_dram_budget_gb: 1.0
          search_dram_budget_gb: 2.0
          # Empty => build Vamana fresh under current code (works for any dataset).
          # For gist1m byte-reproducible runs, point to a pre-built graph prefix.
          external_vamana_path: ''
        query_args: [[30, 40, 50, 60, 80, 100, 130, 170, 220, 300, 400, 500]]
