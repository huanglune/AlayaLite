---
repos:

#===========================================================================
#                            PYTHON FORMAT HOOK
#===========================================================================
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.12.2
  hooks:
  - id: ruff-format
    exclude: ^python/tests/client/_dispatch_matrix_params\.py$
  - id: ruff-check
    args: [--fix]
    exclude: ^python/tests/client/_dispatch_matrix_params\.py$

#===========================================================================
#                            PYTHON LINT HOOK
#===========================================================================
- repo: https://github.com/PyCQA/pylint
  rev: v4.0.4
  hooks:
  - id: pylint
    args:
    - --rcfile=python/.pylintrc
    files: ^(examples|python/src/alayalite|python/tests)/.*\.py$
    exclude: ^python/tests/client/_dispatch_matrix_params\.py$


#===========================================================================
#                            YAML FORMAT HOOK
#===========================================================================
- repo: https://github.com/jumanjihouse/pre-commit-hook-yamlfmt
  rev: 0.2.1
  hooks:
  - id: yamlfmt
    args: [--mapping, '2', --sequence, '2', --offset, '0', --colons, --width, '120']


#===========================================================================
#                            CODE QUALITY PRE_COMMIT HOOK
#===========================================================================
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
  # cmake/vendor/ stays byte-identical to upstream (see cmake-format below).
  - id: trailing-whitespace
    exclude: (\.(yaml|yml)$|^cmake/vendor/)
  - id: end-of-file-fixer
    exclude: (\.(yaml|yml)$|^cmake/vendor/)
  - id: check-added-large-files
    args: [--maxkb=1000]
  - id: check-merge-conflict
  - id: check-yaml


#===========================================================================
#                            SECRET CHECK HOOK
#===========================================================================
- repo: https://github.com/Yelp/detect-secrets
  rev: v1.5.0
  hooks:
  - id: detect-secrets
    args: [--baseline, .secrets.baseline]

#===========================================================================
#                            COMMIT MSG CHECK HOOK
#===========================================================================
- repo: https://github.com/compilerla/conventional-pre-commit
  rev: v4.2.0
  hooks:
  - id: conventional-pre-commit
    stages: [commit-msg]
    args:
    - --strict
    - --force-scope
    - feat
    - fix
    - docs
    - style
    - refactor
    - chore
    - perf
    - test
    - build
    - ci
    - revert

#===========================================================================
#                            TYPOS CHECK
#===========================================================================
- repo: https://github.com/crate-ci/typos
  rev: v1.36.1
  hooks:
  # --force-exclude: pre-commit passes filenames explicitly, which would otherwise
  # override the .typo.toml excludes (cmake/vendor/).
  - id: typos
    args: [-c, .typo.toml, --force-exclude]


#===========================================================================
#                            CMAKE LINT HOOK
#===========================================================================
- repo: https://github.com/cheshirekow/cmake-format-precommit
  rev: v0.6.13
  hooks:
  # cmake/vendor/ holds pinned third-party files (conan_provider.cmake); keep them byte-identical to upstream.
  - id: cmake-format
    exclude: ^cmake/vendor/
  - id: cmake-lint
    exclude: ^cmake/vendor/

#===========================================================================
#                            CLANG FORMAT HOOK
#===========================================================================
- repo: https://github.com/pre-commit/mirrors-clang-format
  rev: v21.1.8
  hooks:
  - id: clang-format
    files: ^(include|python/include|python/src)/.*\.(c|cc|cpp|cxx|h|hpp|hxx|ipp)$
    exclude: ^python/include/dispatch_generated\.hpp$

#===========================================================================
#                            CPPLINT HOOK
#===========================================================================
- repo: https://github.com/cpplint/cpplint
  rev: 2.0.0
  hooks:
  - id: cpplint
    files: ^(include|python/include|python/src)/.*\.(c|cc|cpp|cxx|h|hpp|hxx|ipp)$
    exclude: ^python/include/dispatch_generated\.hpp$
    args:
    - --linelength=100

    - >-
      --filter=
      -build/c++11,
      -build/include_order,
      -whitespace/parens,
      -runtime/references,
      -legal/copyright,
      -whitespace/indent_namespace,
      -build/include_subdir,
      -build/include_what_you_use

    - --recursive

#===========================================================================
#                            CHINESE CHARACTER CHECK HOOK
#===========================================================================
- repo: local
  hooks:
  - id: no-chinese-characters
    name: Check for Chinese characters in code
    entry: python scripts/check_chinese.py
    language: python
    files: (Makefile|\.(c|cc|cpp|cxx|h|hpp|hxx|ipp|py|yaml|yml|sh|cmake|txt))$
    exclude: ^(docs/|build/)

#===========================================================================
#                            REUSE LICENSE COMPLIANCE HOOK
#===========================================================================
- repo: https://codeberg.org/fsfe/reuse-tool
  rev: v6.2.0
  hooks:
  - id: reuse
