[files]
# exclude file list
# cmake/vendor/ holds pinned third-party files (conan_provider.cmake); keep them
# byte-identical to upstream, typos included.
# docs/research/LASER_UPDATE_EXPLORATION.md is a migrated research ledger; its experiment
# arm labels (fill-only and friends, abbreviated) are data, not prose.
extend-exclude = ["cmake/vendor/", "docs/research/LASER_UPDATE_EXPLORATION.md"]

[default.extend-words]
secon = "secon" # keep don't change it
Rabit = "Rabit"
PN = "PN"
nd = "nd"
thr = "thr"
ba = "ba"
po = "po"
nin = "nin" # fixed filter DSL operator name
